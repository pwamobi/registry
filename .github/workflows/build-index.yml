name: Build Registry Index

on:
  push:
    branches: [main]
    paths:
      - 'apps/**.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Publish Registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install js-yaml ajv ajv-formats

      - name: Build registry index
        run: node scripts/build-index.js

      - name: Commit and push registry.json
        run: |
          git config --local user.email "bot@pwa.mobi"
          git config --local user.name "pwa.mobi Registry Bot"
          git add registry.json
          git diff --staged --quiet || git commit -m "chore: rebuild registry index [skip ci]"
          git push
